# ═══════════════════════════════════════════════════════════════════════════════
# OIS.conf — ytcui-dl
# ═══════════════════════════════════════════════════════════════════════════════

# ── Identity ──────────────────────────────────────────────────────────────────
app_name      = ytcui-dl
display_name  = ytcui-dl
binary        = ytcui-dl
install_path  = /usr/local/bin
additional_info = Blazing-fast YouTube stream resolver. Drop-in yt-dlp alternative for YouTube TUI apps.

# ── Updates ───────────────────────────────────────────────────────────────────
version_url   = https://raw.githubusercontent.com/MilkmanAbi/ytcui-dl/main/VERSION
github        = MilkmanAbi/ytcui-dl
update_mode   = ask

# ── Install ───────────────────────────────────────────────────────────────────
require_sudo  = auto

# ── Build ─────────────────────────────────────────────────────────────────────
[build]
system = make

# ── Dependencies ──────────────────────────────────────────────────────────────
[deps]
curl.apt      = libcurl4-openssl-dev
curl.pacman   = curl
curl.dnf      = libcurl-devel
curl.yum      = libcurl-devel
curl.zypper   = libcurl-devel
curl.apk      = curl-dev
curl.brew     = curl
curl.pkg      = curl
curl.cmd      = curl-config
curl.desc     = HTTP client library

openssl.apt    = libssl-dev
openssl.pacman = openssl
openssl.dnf    = openssl-devel
openssl.yum    = openssl-devel
openssl.zypper = libopenssl-devel
openssl.apk    = openssl-dev
openssl.brew   = openssl
openssl.pkg    = openssl
openssl.cmd    = openssl
openssl.desc   = TLS/SSL library

gcc.apt        = g++
gcc.pacman     = gcc
gcc.dnf        = gcc-c++
gcc.yum        = gcc-c++
gcc.zypper     = gcc-c++
gcc.apk        = g++
gcc.brew       = gcc
gcc.pkg        = gcc
gcc.cmd        = g++
gcc.desc       = C++ compiler

[deps.optional]
